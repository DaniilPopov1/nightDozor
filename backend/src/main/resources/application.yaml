spring:
  profiles:
    active: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nightdozor}
    username: ${DB_USERNAME:nightdozor_user}
    password: ${DB_PASSWORD:nightdozor_password}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      "[mail.smtp.auth]": true
      "[mail.smtp.starttls.enable]": true

server:
  port: ${SERVER_PORT:8080}

app:
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME}}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:nightdozor-dev-secret-key-must-be-at-least-32-bytes}
    access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:1440}
