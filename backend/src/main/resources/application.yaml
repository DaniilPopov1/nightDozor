spring:
  profiles:
    active: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nightdozor}
    username: ${DB_USERNAME:nightdozor_user}
    password: ${DB_PASSWORD:nightdozor_password}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      "[mail.smtp.auth]": true
      "[mail.smtp.starttls.enable]": true

server:
  port: ${SERVER_PORT:8080}

app:
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME}}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}